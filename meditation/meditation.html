<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Break Now — Mindful Moment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background:
        radial-gradient(circle at 50% 40%, rgba(232,168,124,0.06), transparent 45%),
        linear-gradient(180deg, #10101d 0%, #0d0d1a 100%);
      color: #f0ece2;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      min-height: 100vh; text-align: center; padding: 20px;
      overflow: hidden; position: relative;
    }

    /* Breathing glow behind the ring */
    body::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 420px; height: 420px; transform: translate(-50%, -55%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,168,124,0.07) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 7s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -55%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -55%) scale(1.15); }
    }

    /* ── Main content ── */
    #main-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
    }

    #main-title {
      font-size: clamp(18px, 1.8vw, 22px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(240,236,226,0.50);
      margin-bottom: 40px;
    }

    /* ── Circular progress ring area ── */
    .ring-container {
      position: relative;
      width: 320px; height: 320px;
      margin-bottom: 48px;
    }

    .ring-container svg {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: rgba(240,236,226,0.06);
      stroke-width: 3;
    }

    .ring-progress {
      fill: none;
      stroke: #e8a87c;
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 8px rgba(232,168,124,0.3));
    }

    /* Inner content (image + timer) centered in ring */
    .ring-inner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    #focus-image {
      width: 140px; height: 140px;
      object-fit: contain;
      border-radius: 50%;
      opacity: 0.85;
      margin-bottom: 16px;
    }

    #timer-display {
      font-size: 42px;
      font-weight: 300;
      letter-spacing: 4px;
      color: rgba(240,236,226,0.92);
      font-variant-numeric: tabular-nums;
    }

    /* ── Buttons ── */
    .actions {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }

    #btn-grace {
      padding: 0; margin: 0;
      background: none; border: none;
      color: rgba(232,168,124,0.7);
      font-size: 0.92rem;
      font-family: inherit;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: color 0.2s ease;
      min-width: unset;
      text-decoration: none;
    }
    #btn-grace:hover {
      color: #e8a87c;
      background: none; border: none;
      transform: none;
    }

    #btn-close {
      padding: 14px 44px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 500;
      letter-spacing: 0.04em;
      background: rgba(240,236,226,0.08);
      color: rgba(240,236,226,0.75);
      border: 1px solid rgba(240,236,226,0.10);
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.22s ease;
      min-width: unset;
    }
    #btn-close:hover {
      background: rgba(240,236,226,0.14);
      color: rgba(240,236,226,0.95);
      transform: translateY(-1px);
    }

    /* ── Mute button ── */
    #btn-mute {
      position: fixed; top: 24px; right: 24px;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 50%;
      color: rgba(240,236,226,0.35);
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      padding: 0; min-width: unset; z-index: 10;
      cursor: pointer; transition: all 0.2s ease;
    }
    #btn-mute:hover { background: rgba(255,255,255,0.1); color: rgba(240,236,226,0.7); }

    /* ── Grace panel ── */
    #grace-panel {
      display: none; position: fixed; top: 18px; right: 18px;
      left: auto; transform: none;
      background-color: rgba(22,22,40,0.96);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      color: #f0ece2; padding: 28px 32px; border-radius: 14px;
      border: 0.5px solid rgba(232,168,124,0.10);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      min-width: 270px; max-width: 300px; text-align: center; z-index: 10;
    }
    #grace-panel p {
      margin-bottom: 10px; line-height: 1.5;
      color: rgba(240,236,226,0.55); font-size: 0.92rem;
    }
    #grace-timer {
      font-weight: 300; font-size: 25.2px;
      letter-spacing: 2px; margin-bottom: 14px; color: #e8a87c;
      font-variant-numeric: tabular-nums;
    }
    #grace-start-now {
      background-color: #e8a87c; color: #1a1a2e; border: none;
      padding: 7px 11px; border-radius: 8px; font-size: 0.9em;
      font-weight: 600; cursor: pointer; min-width: 162px;
      font-family: inherit; transition: all 0.2s ease;
    }
    #grace-start-now:hover { background-color: #d4956a; color: #1a1a2e; transform: translateY(-1px); }

    /* ── Confirm modal ── */
    #confirm-modal {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background-color: rgba(22,22,40,0.96);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      color: #f0ece2; padding: 32px 38px; border-radius: 16px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      border: 0.5px solid rgba(232,168,124,0.10);
      min-width: 320px; max-width: 400px; text-align: center; z-index: 20;
    }
    #confirm-modal p {
      font-size: 1rem; line-height: 1.65;
      margin-bottom: 28px; color: rgba(240,236,226,0.65);
    }
    .confirm-buttons { display: flex; justify-content: center; gap: 12px; }
    .confirm-buttons button {
      width: 120px; font-weight: 600; border: none;
      min-width: unset; border-radius: 999px;
      padding: 12px 0; font-size: 0.9rem; font-family: inherit;
      cursor: pointer; transition: all 0.2s ease;
    }
    #btn-stay { background-color: #e8a87c !important; color: #1a1a2e !important; }
    #btn-stay:hover { background-color: #d4956a !important; transform: translateY(-1px); }
    #btn-leave { background-color: rgba(255,255,255,0.06) !important; color: rgba(240,236,226,0.4) !important; }
    #btn-leave:hover { background-color: rgba(255,255,255,0.1) !important; color: rgba(240,236,226,0.7) !important; }

    body.grace-mode #grace-panel { display: block; }

    /* ── Fade-in ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #main-content { animation: fadeUp 0.8s ease-out; }
  </style>
</head>
<body>
  <button id="btn-mute">&#x1F50A;</button>

  <div id="main-content">
    <h2 id="main-title">Time to pause</h2>

    <div class="ring-container">
      <svg viewBox="0 0 320 320">
        <circle class="ring-bg" cx="160" cy="160" r="150" />
        <circle id="ring-progress" class="ring-progress" cx="160" cy="160" r="150" />
      </svg>
      <div class="ring-inner">
        <img id="focus-image" src="" alt="Mindful Moment">
        <div id="timer-display"></div>
      </div>
    </div>

    <div class="actions">
      <button id="btn-close">Back to Work</button>
      <button id="btn-grace">Need 3 mins to wrap up?</button>
    </div>
  </div>

  <div id="grace-panel">
    <p id="grace-message"></p>
    <div id="grace-timer"></div>
    <button id="grace-start-now">Start Meditation Now</button>
  </div>

  <div id="confirm-modal">
    <p>Almost there! A few minutes of calm goes a long way.</p>
    <div class="confirm-buttons">
      <button id="btn-stay">Stay</button>
      <button id="btn-leave">Leave</button>
    </div>
  </div>

  <script src="../shared/meditation_protocol.js"></script>
  <script src="meditation.js"></script>
</body>
</html>
